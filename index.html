<!doctype html>
<html lang="en-GB">
<head>
<meta charset="utf-8">
<title>Consors — a private publication and concierge</title>
<style>
/* ─────────────────────────────────────────────
   Consors — core tokens
   Colour, type, spacing, hairlines.
   ─────────────────────────────────────────────*/

/* Font substitutes — see README. Spectral ≈ Plantin MT Pro; Jost ≈ Gibson. */
@import url('https://fonts.googleapis.com/css2?family=Spectral:ital,wght@0,400;0,500;1,400;1,500&family=Jost:wght@400;500;600&display=swap');

:root {
  /* Palette — exact values from Figma */
  --obsidian:     #0E0E10;
  --alabaster:    #F4F0E8;
  --white:        #FFFFFF;
  --stone:        #8A7F6E;
  --oxblood:      #5A1A1F;
  --gold:         #B08D57;

  /* Semantic colour roles */
  --ink:              var(--obsidian);
  --ink-secondary:    var(--stone);
  --ink-inverse:      var(--alabaster);
  --ground:           var(--alabaster);       /* marketing default */
  --surface:          var(--white);           /* reading default */
  --accent-editorial: var(--oxblood);         /* links, accents, rules */
  --accent-metal:     var(--gold);            /* credential, signet */

  --hairline-strong: color-mix(in oklab, var(--obsidian) 60%, transparent);
  --hairline:        color-mix(in oklab, var(--obsidian) 40%, transparent);
  --hairline-soft:   color-mix(in oklab, var(--obsidian) 20%, transparent);
  --hairline-metal:  color-mix(in oklab, var(--gold) 70%, transparent);

  /* Type families */
  --serif: "Plantin MT Pro", "Spectral", Georgia, "Times New Roman", serif;
  --sans:  "Gibson", "Jost", "Helvetica Neue", Helvetica, Arial, sans-serif;

  /* Display scale (Plantin) */
  --display-xxl: 64px;  /* hero headline, desktop */
  --display-xl:  48px;  /* section opener */
  --display-lg:  36px;  /* article title */
  --display-md:  28px;  /* sub-headline */
  --display-sm:  22px;  /* card title */
  --display-xs:  18px;  /* deck */
  --body-serif:  18px;  /* reading body */

  /* UI scale (Gibson) */
  --ui-lg:   18px;   /* lead UI */
  --ui-md:   16px;   /* body UI */
  --ui-sm:   14px;   /* metadata */
  --ui-xs:   13px;   /* labels */
  --ui-caps: 12px;   /* small caps, tracked */
  --ui-micro:11px;   /* finest metadata */

  /* Line heights */
  --lh-display: 1.1;
  --lh-body:    1.45;
  --lh-ui:      1.3;

  /* Tracking */
  --track-caps:      0.12em;
  --track-caps-tight:0.08em;

  /* Spacing — named, not numeric */
  --space-hairline:  0.5px;
  --space-tight:     4px;
  --space-small:     8px;
  --space-close:     12px;
  --space-default:   16px;
  --space-roomy:     24px;
  --space-wide:      32px;
  --space-section:   48px;
  --space-chapter:   72px;
  --space-threshold: 96px;

  /* Layout */
  --measure: 62ch;
  --gutter-desktop: 32px;
  --gutter-mobile:  16px;
  --margin-desktop: 96px;
  --margin-mobile:  20px;

  /* Radius — virtually always zero */
  --radius-0: 0;
  --radius-input: 2px;
  --radius-signet: 50%;

  /* Motion */
  --ease:          cubic-bezier(0.2, 0, 0, 1);
  --dur-fast:      200ms;
  --dur-page:      400ms;
  --dur-reveal:    600ms;
}

/* ─────────────────────────────────────────────
   Element defaults — a tiny reset for mocks.
   ─────────────────────────────────────────────*/

html, body {
  background: var(--ground);
  color: var(--ink);
  font-family: var(--serif);
  font-size: var(--body-serif);
  line-height: var(--lh-body);
  font-feature-settings: "onum", "liga", "kern";
  -webkit-font-smoothing: antialiased;
  text-rendering: optimizeLegibility;
}

h1, h2, h3, h4, h5 {
  font-family: var(--serif);
  font-weight: 400;
  line-height: var(--lh-display);
  letter-spacing: -0.005em;
  margin: 0;
}

h1 { font-size: var(--display-xxl); }
h2 { font-size: var(--display-xl);  }
h3 { font-size: var(--display-lg);  }
h4 { font-size: var(--display-md);  }
h5 { font-size: var(--display-sm);  }

p {
  margin: 0 0 1em 0;
  max-width: var(--measure);
}

em, i { font-style: italic; }

a {
  color: inherit;
  text-decoration: none;
  border-bottom: 0.5px solid var(--hairline-strong);
  transition: border-color var(--dur-fast) var(--ease), color var(--dur-fast) var(--ease);
}
a:hover {
  color: var(--oxblood);
  border-bottom-color: var(--oxblood);
}

/* UI type utility classes */
.ui       { font-family: var(--sans); font-size: var(--ui-md); line-height: var(--lh-ui); letter-spacing: 0.005em; }
.ui-sm    { font-family: var(--sans); font-size: var(--ui-sm); line-height: var(--lh-ui); }
.ui-caps  { font-family: var(--sans); font-size: var(--ui-caps); line-height: var(--lh-ui);
            text-transform: uppercase; letter-spacing: var(--track-caps); font-weight: 500; }
.ui-micro { font-family: var(--sans); font-size: var(--ui-micro); line-height: var(--lh-ui);
            text-transform: uppercase; letter-spacing: var(--track-caps); color: var(--ink-secondary); }

.caption  { font-family: var(--sans); font-size: var(--ui-caps); color: var(--ink-secondary);
            line-height: var(--lh-ui); }

.dropcap::first-letter {
  font-family: var(--serif);
  font-size: 4.4em;
  line-height: 0.85;
  float: left;
  padding: 0.05em 0.08em 0 0;
  color: var(--ink);
}

/* Decorative 32px rule, centred */
.rule {
  width: 32px;
  height: 0;
  border-top: 0.5px solid var(--oxblood);
  margin: var(--space-section) auto;
}

.hairline-t { border-top: 0.5px solid var(--hairline); }
.hairline-b { border-bottom: 0.5px solid var(--hairline); }

/* Button */
.btn {
  font-family: var(--sans);
  font-size: var(--ui-caps);
  letter-spacing: var(--track-caps);
  text-transform: uppercase;
  font-weight: 500;
  padding: 14px 28px;
  background: var(--obsidian);
  color: var(--alabaster);
  border: 0.5px solid var(--obsidian);
  border-radius: 0;
  cursor: pointer;
  transition: opacity var(--dur-fast) var(--ease), background var(--dur-fast) var(--ease);
}
.btn:hover { background: #1a1a1c; }
.btn:active { opacity: 0.85; }

.btn-ghost {
  background: transparent;
  color: var(--obsidian);
  border: 0.5px solid var(--obsidian);
}
.btn-ghost:hover { background: var(--obsidian); color: var(--alabaster); }

/* Input */
.input {
  font-family: var(--sans);
  font-size: var(--ui-md);
  padding: 12px 14px;
  background: transparent;
  color: var(--ink);
  border: 0;
  border-bottom: 0.5px solid var(--hairline-strong);
  border-radius: 0;
  outline: none;
  width: 100%;
}
.input:focus { border-bottom-color: var(--obsidian); }
.input::placeholder { color: var(--ink-secondary); }

</style>
<style>
  html,body { margin:0; background: #0E0E10; }
  a { text-decoration: none; }
  ::selection { background: #5A1A1F; color: #F4F0E8; }
</style>
<script src="https://unpkg.com/react@18.3.1/umd/react.development.js" integrity="sha384-hD6/rw4ppMLGNu3tX5cjIb+uRZ7UkRJ6BPkLpg4hAu/6onKUg4lLsHAs9EBPT82L" crossorigin="anonymous"></script>
<script src="https://unpkg.com/react-dom@18.3.1/umd/react-dom.development.js" integrity="sha384-u6aeetuaXnQ38mYT8rp6sbXaQe3NL9t+IBXmnYxwkUI2Hw4bsp2Wvmx4yRQF1uAm" crossorigin="anonymous"></script>
<script src="https://unpkg.com/@babel/standalone@7.29.0/babel.min.js" integrity="sha384-m08KidiNqLdpJqLq95G/LEi8Qvjl/xUYll3QILypMoQ65QorJ9Lvtp2RXYGBFj1y" crossorigin="anonymous"></script>

<body>
<div id="app"></div>
<script type="text/babel">
/* ===== Primitives.jsx ===== */
// Shared primitives + tokens for the landing page. All sizes follow section 6.
const TOKENS = {
  obsidian:  '#0E0E10',
  alabaster: '#F4F0E8',
  oxblood:   '#5A1A1F',
  gold:      '#B08D57',
  goldLight: '#C9B896',
  stone:     '#8A7F6E',
  white:     '#FFFFFF',
  container: 1120,
  pageMargin: 160,
};

function Container({ children, style }) {
  return (
    <div style={{ maxWidth: 1120, margin: '0 auto', padding: '0 24px', ...style }}>
      {children}
    </div>
  );
}

function Eyebrow({ children, on = 'dark' }) {
  const colour = on === 'dark' ? TOKENS.gold
                : on === 'light' ? TOKENS.oxblood
                : TOKENS.stone;
  return (
    <div style={{
      fontFamily: 'var(--sans)', fontSize: 11, fontWeight: 500,
      letterSpacing: '0.3em', textTransform: 'uppercase',
      lineHeight: '16px', color: colour,
    }}>— {children} —</div>
  );
}

function Divider({ on = 'dark', width = 30 }) {
  const colour = on === 'dark' ? TOKENS.gold : TOKENS.oxblood;
  return <div style={{ width, borderTop: `0.5px solid ${colour}`, margin: '22px 0' }}/>;
}

function PrimaryBtn({ children, href }) {
  const style = {
    fontFamily: 'var(--sans)', fontSize: 11, fontWeight: 500,
    letterSpacing: '0.28em', textTransform: 'uppercase',
    padding: '14px 34px', background: TOKENS.gold,
    color: TOKENS.obsidian, border: 0, borderRadius: 2, cursor: 'pointer',
    transition: 'background 200ms cubic-bezier(0.2,0,0,1)',
    textDecoration: 'none', display: 'inline-block',
  };
  const handlers = {
    onMouseEnter: e => e.currentTarget.style.background = '#A1814F',
    onMouseLeave: e => e.currentTarget.style.background = TOKENS.gold,
  };
  if (href) return <a href={href} style={style} {...handlers}>{children}</a>;
  return <button style={style} {...handlers}>{children}</button>;
}

function SecondaryBtn({ children, on = 'dark', href }) {
  const colour = on === 'dark' ? TOKENS.gold : TOKENS.oxblood;
  const style = {
    fontFamily: 'var(--sans)', fontSize: 11, fontWeight: 500,
    letterSpacing: '0.28em', textTransform: 'uppercase',
    padding: '14px 34px', background: 'transparent',
    color: colour, border: `0.5px solid ${colour}`, borderRadius: 2, cursor: 'pointer',
    textDecoration: 'none', display: 'inline-block',
  };
  if (href) return <a href={href} style={style}>{children}</a>;
  return <button style={style}>{children}</button>;
}

function Wordmark({ colour = TOKENS.obsidian, size = 11 }) {
  return (
    <span style={{
      fontFamily: 'var(--serif)', fontWeight: 400,
      letterSpacing: '0.18em', textTransform: 'uppercase',
      fontSize: size, color: colour,
    }}>CONSORS</span>
  );
}

function Signet({ size = 22, ring = TOKENS.gold, letter = TOKENS.gold, bg = 'transparent' }) {
  return (
    <svg width={size} height={size} viewBox="0 0 60 60" style={{ display:'block' }}>
      <circle cx="30" cy="30" r="29.5" fill={bg} stroke={ring} strokeWidth="0.5"/>
      <circle cx="30" cy="30" r="25.5" fill="none" stroke={ring} strokeWidth="0.5"/>
      <text x="30" y="30" textAnchor="middle" dominantBaseline="central"
            fontFamily="var(--serif)" fontSize="28" fill={letter}>C</text>
    </svg>
  );
}

window.TOKENS = TOKENS;
window.Container = Container;
window.Eyebrow = Eyebrow;
window.Divider = Divider;
window.PrimaryBtn = PrimaryBtn;
window.SecondaryBtn = SecondaryBtn;
window.Wordmark = Wordmark;
window.Signet = Signet;


/* ===== Tweaks.jsx ===== */
// Edit-mode defaults. Keys are merged back to disk by the host.
const TWEAK_DEFAULTS = /*EDITMODE-BEGIN*/{
  "quoteFontSize": 32,
  "quoteLineHeight": 46,
  "quoteMaxWidth": 720,
  "underCtaAlign": "center"
}/*EDITMODE-END*/;

function useTweaks() {
  const [tweaks, setTweaks] = React.useState(TWEAK_DEFAULTS);
  const [open, setOpen] = React.useState(false);
  const [available, setAvailable] = React.useState(false);

  React.useEffect(() => {
    function onMsg(e) {
      const d = e.data || {};
      if (d.type === '__activate_edit_mode')   { setOpen(true); setAvailable(true); }
      if (d.type === '__deactivate_edit_mode') { setOpen(false); }
    }
    window.addEventListener('message', onMsg);
    window.parent.postMessage({ type: '__edit_mode_available' }, '*');
    return () => window.removeEventListener('message', onMsg);
  }, []);

  const set = React.useCallback((patch) => {
    setTweaks(t => ({ ...t, ...patch }));
    window.parent.postMessage({ type: '__edit_mode_set_keys', edits: patch }, '*');
  }, []);

  return { tweaks, set, open, available };
}

function TweaksPanel({ tweaks, set, open }) {
  if (!open) return null;
  const row = { display: 'grid', gridTemplateColumns: '120px 1fr', gap: 10,
                alignItems: 'center', padding: '8px 0',
                borderBottom: '0.5px solid #ffffff14' };
  const label = { fontFamily: 'var(--sans)', fontSize: 10, fontWeight: 500,
                  letterSpacing: '0.22em', textTransform: 'uppercase',
                  color: '#B08D57' };
  return (
    <div style={{
      position: 'fixed', right: 20, bottom: 20, width: 300,
      background: '#0E0E10', color: '#F4F0E8',
      border: '0.5px solid #B08D5759', borderRadius: 8,
      padding: 18, zIndex: 1000,
      fontFamily: 'var(--sans)', fontSize: 12,
    }}>
      <div style={{
        fontFamily: 'var(--serif)', fontSize: 16, letterSpacing: '0.18em',
        textTransform: 'uppercase', color: '#F4F0E8',
        borderBottom: '0.5px solid #B08D57', paddingBottom: 10, marginBottom: 10,
      }}>Tweaks</div>

      <div style={row}>
        <span style={label}>Quote size</span>
        <input type="range" min="16" max="56" value={tweaks.quoteFontSize}
               onChange={e => set({ quoteFontSize: +e.target.value,
                                    quoteLineHeight: Math.round(+e.target.value * 1.45) })}/>
      </div>
      <div style={row}>
        <span style={label}>Quote width</span>
        <input type="range" min="420" max="900" step="20" value={tweaks.quoteMaxWidth}
               onChange={e => set({ quoteMaxWidth: +e.target.value })}/>
      </div>
      <div style={row}>
        <span style={label}>Under-CTA</span>
        <select value={tweaks.underCtaAlign}
                onChange={e => set({ underCtaAlign: e.target.value })}
                style={{
                  background: '#1A1A1D', color: '#F4F0E8',
                  border: '0.5px solid #B08D5759', padding: '6px 8px',
                  fontFamily: 'var(--sans)', fontSize: 12,
                }}>
          <option value="center">Center</option>
          <option value="left">Left</option>
          <option value="right">Right</option>
        </select>
      </div>
    </div>
  );
}

window.useTweaks = useTweaks;
window.TweaksPanel = TweaksPanel;

        </p>
      </div>

      <form onSubmit={e => { e.preventDefault(); setSubmitted(true); }}>
        <Field label="Email" type="email" name="email" autoComplete="email"
               required value={email} onChange={e => setEmail(e.target.value)}/>

        <div style={{ marginTop: 40, textAlign: 'center' }}>
          <PrimaryBtn>Send reset link</PrimaryBtn>
        </div>

        <div style={{
          marginTop: 40, textAlign: 'center',
          fontFamily: 'var(--serif)', fontStyle: 'italic', fontSize: 13,
          color: TOKENS.stone,
        }}>
          <a href="signin.html" style={{ color: TOKENS.stone, border: 0 }}>
            Return to sign in
          </a>
          <span style={{ margin: '0 10px' }}>·</span>
          <a href="apply.html" style={{ color: TOKENS.stone, border: 0 }}>
            Apply for membership
          </a>
        </div>
      </form>
    </div>
  );
}
window.ForgotPasswordPage = ForgotPasswordPage;
